apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  labels:
    app.kubernetes.io/name: perses-dashboard
    app.kubernetes.io/instance: webhook-perf-test
    app.kubernetes.io/part-of: perses-operator
  name: webhook-perf-test
  namespace: webhook-perf-test
spec:
  config:
    display:
      name: Webhook Performance
    panels:
      "0":
        kind: Panel
        spec:
          display:
            description: Average latency for the 10 slowest webhooks over time
            name: Top 10 Webhook Admission Latency
          plugin:
            kind: TimeSeriesChart
            spec:
              visual:
                areaOpacity: 0.1
                display: line
                lineWidth: 2
              yAxis:
                format:
                  unit: seconds
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: topk(10,
                      rate(apiserver_admission_webhook_admission_duration_seconds_sum{name=~"$webhook_filter"}[5m])
                      /
                      rate(apiserver_admission_webhook_admission_duration_seconds_count{name=~"$webhook_filter"}[5m]))
                    seriesNameFormat: "{{name}}"
      "1":
        kind: Panel
        spec:
          display:
            description: Sum of all webhook-perf webhook latencies — the total admission
              delay added to each API request
            name: Total Webhook Overhead Per Request
          plugin:
            kind: TimeSeriesChart
            spec:
              visual:
                areaOpacity: 0.1
                display: line
                lineWidth: 2
              yAxis:
                format:
                  unit: seconds
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: sum(rate(apiserver_admission_webhook_admission_duration_seconds_sum{name=~"$webhook_filter",
                      type="validating"}[5m]) / rate(apiserver_admission_webhook_admission_duration_seconds_count{name=~"$webhook_filter",
                      type="validating"}[5m]))
                    seriesNameFormat: Validating total
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: sum(rate(apiserver_admission_webhook_admission_duration_seconds_sum{name=~"$webhook_filter",
                      type="admit"}[5m]) / rate(apiserver_admission_webhook_admission_duration_seconds_count{name=~"$webhook_filter",
                      type="admit"}[5m]))
                    seriesNameFormat: Mutating total
      "2":
        kind: Panel
        spec:
          display:
            description: P99 end-to-end API request duration for pod/deployment create and
              update operations
            name: Total API Request Duration (including admission)
          plugin:
            kind: TimeSeriesChart
            spec:
              visual:
                areaOpacity: 0.1
                display: line
                lineWidth: 2
              yAxis:
                format:
                  unit: seconds
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: histogram_quantile(0.99, sum by (le)
                      (rate(apiserver_request_duration_seconds_bucket{resource=~"pods|deployments",
                      subresource="",
                      verb=~"POST|PUT|CREATE|UPDATE|PATCH"}[5m])))
                    seriesNameFormat: P99 all create/update
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: histogram_quantile(0.50, sum by (le)
                      (rate(apiserver_request_duration_seconds_bucket{resource=~"pods|deployments",
                      subresource="",
                      verb=~"POST|PUT|CREATE|UPDATE|PATCH"}[5m])))
                    seriesNameFormat: P50 all create/update
      "3":
        kind: Panel
        spec:
          display:
            description: Total webhook calls in the last 5 minutes
            name: Webhook Calls (5m window)
          plugin:
            kind: TimeSeriesChart
            spec:
              visual:
                areaOpacity: 0.2
                display: line
                lineWidth: 2
              yAxis:
                format:
                  decimalPlaces: 0
                  unit: decimal
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: sum(increase(apiserver_admission_webhook_admission_duration_seconds_count{name=~"$webhook_filter",
                      type="validating"}[5m]))
                    seriesNameFormat: Validating calls
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: sum(increase(apiserver_admission_webhook_admission_duration_seconds_count{name=~"$webhook_filter",
                      type="admit"}[5m]))
                    seriesNameFormat: Mutating calls
      "4":
        kind: Panel
        spec:
          display:
            description: Total webhook rejections in the last 5 minutes
            name: Webhook Rejections (5m window)
          plugin:
            kind: TimeSeriesChart
            spec:
              visual:
                areaOpacity: 0.5
                display: bar
                lineWidth: 1
              yAxis:
                format:
                  decimalPlaces: 0
                  unit: decimal
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: sum(increase(apiserver_admission_webhook_admission_duration_seconds_count{name=~"$webhook_filter",
                      rejected="true"}[5m])) or vector(0)
                    seriesNameFormat: Rejections
      "5":
        kind: Panel
        spec:
          display:
            description: Which webhooks rejected the most requests over the dashboard time
              range
            name: Top 10 Rejecting Webhooks
          plugin:
            kind: BarChart
            spec:
              calculation: last-number
              format:
                decimalPlaces: 0
                unit: decimal
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    query: topk(10, sum by (name)
                      (increase(apiserver_admission_webhook_admission_duration_seconds_count{name=~"$webhook_filter",
                      rejected="true"}[$__range])))
                    seriesNameFormat: "{{name}}"
    layouts:
      - kind: Grid
        spec:
          display:
            title: Panel Group 1
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 12
              height: 10
              content:
                $ref: "#/spec/panels/0"
            - x: 12
              "y": 0
              width: 12
              height: 10
              content:
                $ref: "#/spec/panels/1"
            - x: 0
              "y": 10
              width: 12
              height: 10
              content:
                $ref: "#/spec/panels/2"
            - x: 12
              "y": 10
              width: 12
              height: 10
              content:
                $ref: "#/spec/panels/3"
            - x: 0
              "y": 20
              width: 12
              height: 10
              content:
                $ref: "#/spec/panels/4"
            - x: 12
              "y": 20
              width: 12
              height: 10
              content:
                $ref: "#/spec/panels/5"
    variables:
      - kind: ListVariable
        spec:
          name: webhook_filter
          display:
            name: Webhooks
          defaultValue: "webhook-perf-.*"
          allowMultiple: false
          allowAllValue: false
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - label: "webhook-perf-test only"
                  value: "webhook-perf-.*"
                - label: "All cluster webhooks"
                  value: ".*"
    duration: 1h
    refreshInterval: 0s
    datasources: {}
