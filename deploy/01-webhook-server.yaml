apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-server-code
  namespace: webhook-perf-test
  labels:
    app: webhook-server
data:
  server.py: |
    import http.server
    import ssl
    import json
    import os
    import time
    import base64
    import random

    DELAY_MS = int(os.environ.get("WEBHOOK_DELAY_MS", "100"))
    REJECT_PERCENT = int(os.environ.get("WEBHOOK_REJECT_PERCENT", "25"))
    WEBHOOK_NAME = os.environ.get("WEBHOOK_NAME", "webhook-test")
    CERT_PATH = os.environ.get("TLS_CERT_PATH", "/etc/tls/tls.crt")
    KEY_PATH = os.environ.get("TLS_KEY_PATH", "/etc/tls/tls.key")
    PORT = 8443


    class WebhookHandler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"ok")
                return
            self.send_response(404)
            self.end_headers()

        def do_POST(self):
            start = time.time()
            content_length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(content_length)
            review = json.loads(body)

            request = review.get("request", {})
            uid = request.get("uid", "")
            kind = request.get("kind", {}).get("kind", "Unknown")
            namespace = request.get("namespace", "")

            time.sleep(DELAY_MS / 1000.0)

            rejected = False
            if self.path == "/validate":
                response = self._validate_response(uid)
                rejected = not response["response"]["allowed"]
            elif self.path == "/mutate":
                obj = request.get("object", {})
                has_annotations = bool(obj.get("metadata", {}).get("annotations"))
                response = self._mutate_response(uid, has_annotations)
            else:
                self.send_response(404)
                self.end_headers()
                return

            resp_body = json.dumps(response).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(resp_body)))
            self.end_headers()
            self.wfile.write(resp_body)

            elapsed = (time.time() - start) * 1000
            status = "REJECTED" if rejected else "allowed"
            print(
                f"{time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())} "
                f"webhook={WEBHOOK_NAME} path={self.path} kind={kind} "
                f"namespace={namespace} delay={DELAY_MS}ms "
                f"elapsed={elapsed:.0f}ms status={status}"
            )

        def _validate_response(self, uid):
            rejected = REJECT_PERCENT > 0 and random.randint(1, 100) <= REJECT_PERCENT
            response = {
                "uid": uid,
                "allowed": not rejected,
            }
            if rejected:
                response["status"] = {
                    "code": 403,
                    "message": f"Rejected by {WEBHOOK_NAME} (simulated failure)",
                }
            return {
                "apiVersion": "admission.k8s.io/v1",
                "kind": "AdmissionReview",
                "response": response,
            }

        def _mutate_response(self, uid, has_annotations=False):
            patch = []
            if not has_annotations:
                patch.append({"op": "add", "path": "/metadata/annotations", "value": {}})
            patch.append({
                "op": "add",
                "path": "/metadata/annotations/webhook-test~1processed-by",
                "value": WEBHOOK_NAME,
            })
            patch_bytes = base64.b64encode(json.dumps(patch).encode()).decode()
            return {
                "apiVersion": "admission.k8s.io/v1",
                "kind": "AdmissionReview",
                "response": {
                    "uid": uid,
                    "allowed": True,
                    "patchType": "JSONPatch",
                    "patch": patch_bytes,
                },
            }

        def log_message(self, format, *args):
            pass


    if __name__ == "__main__":
        server = http.server.HTTPServer(("0.0.0.0", PORT), WebhookHandler)
        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
        ctx.load_cert_chain(CERT_PATH, KEY_PATH)
        server.socket = ctx.wrap_socket(server.socket, server_side=True)
        print(f"Webhook server starting on :{PORT} delay={DELAY_MS}ms reject={REJECT_PERCENT}% name={WEBHOOK_NAME}")
        server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-server
  namespace: webhook-perf-test
  labels:
    app: webhook-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-server
  template:
    metadata:
      labels:
        app: webhook-server
    spec:
      containers:
        - name: webhook-server
          image: registry.access.redhat.com/ubi9/python-312
          command: ["python3", "/app/server.py"]
          ports:
            - containerPort: 8443
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: WEBHOOK_DELAY_MS
              value: "100"
            - name: WEBHOOK_REJECT_PERCENT
              value: "25"
            - name: WEBHOOK_NAME
              value: "webhook-test"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          volumeMounts:
            - name: server-code
              mountPath: /app/server.py
              subPath: server.py
              readOnly: true
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: server-code
          configMap:
            name: webhook-server-code
        - name: tls-certs
          secret:
            secretName: webhook-server-cert
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-server
  namespace: webhook-perf-test
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: webhook-server-cert
spec:
  selector:
    app: webhook-server
  ports:
    - port: 443
      targetPort: 8443
      protocol: TCP
